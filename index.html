<style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(120deg, #1a1a2e, #16213e, #0f3460);
    color: white;
    display: flex;
    flex-direction: column;
  }

  .header {
    text-align: center;
    padding: 60px 20px 30px;
  }

  .header h1 {
    font-size: 42px;
    margin: 0;

    margin-top: 12px;

    margin: 30px auto;
    border: none;
    border-top: 1px solid rgba(255,255,255,0.2);
  }

  .container {
    max-width: 1000px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 20px;
    flex: 1; /* 撐滿中間空間 */
  }

  .card {
    display: block;
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 25px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
    text-decoration: none;
    color: white;
  }

  .card:hover {
    transform: translateY(-8px) scale(1.05);
    box-shadow: 0 12px 25px rgba(0,0,0,0.5);
  }

  .card .title {
    font-size: 18px;
    font-weight: bold;
  }

  .icon {
    font-size: 30px;
    margin-bottom: 10px;
  }

  footer {
    text-align: center;
    color: #aaa;
    padding: 20px;
    font-size: 14px;
  }
</style>
</head>
