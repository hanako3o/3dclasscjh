<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(120deg, #1a1a2e, #16213e, #0f3460);
    color: white;
    margin: 0;
    padding: 0;
  }

  .header {
    text-align: center;
    padding: 60px 20px 30px;
  }

  .header h1 {
    font-size: 42px;
    margin: 0;
    letter-spacing: 2px;

  .header p {
    margin-top: 10px;
    color: #cfcfcf;
    font-size: 18px;
  }

  hr {
    width: 70%;
    margin: 30px auto;
    border: none;
    border-top: 1px solid rgba(255,255,255,0.2);
  }

  .container {
    max-width: 800px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 25px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 12px 25px rgba(0,0,0,0.5);
  }

  .card a {
    text-decoration: none;
    color: white;
    font-size: 18px;
    font-weight: bold;
  }

  .icon {
    font-size: 30px;
    margin-bottom: 10px;
  }

  footer {
    text-align: center;
    color: #aaa;
    padding: 20px;
    font-size: 14px;
  }
</style>
