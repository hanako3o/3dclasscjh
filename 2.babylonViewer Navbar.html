<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babylon Viewer 導覽列</title>

<script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

<style>
  html, body { height: 100%; margin: 0; }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(120deg, #1a1a2e, #16213e, #0f3460);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    padding: 40px 20px 10px;
  }

  .header h1 {
    margin: 0;
    font-size: 36px;
  }

  .subtitle {
    color: #cfcfcf;
    margin-top: 8px;
  }

  .controls {
    margin-top: 20px;
  }

  select {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    background: rgba(255,255,255,0.1);
    color: white;
    backdrop-filter: blur(5px);
  }

  select option { color: black; }

  .viewer {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 30px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    background: #000;
  }

  babylon {
    width: 100%;
    height: 100%;
    display: block;
  }

  .btn {
    margin-top: 30px;
    padding: 12px 25px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    text-decoration: none;
    transition: 0.3s;
  }

  .btn:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
  }
</style>

<script>
  function loadit(modelUrl) {
    if(modelUrl) {
      let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
      let temp = viewer.templateManager.getTemplate('navBar');
      let param = temp._configuration;

      param.params.hideVr = false;
      param.params.disableOnFullscreen = true;

      temp.updateParams(param);
      viewer.loadModel(modelUrl);
    }
  }
</script>

</head>

<body>

<div class="header">
  <h1>Babylon 導覽列展示</h1>
  <div class="subtitle">含 VR 與功能導覽列的模型展示</div>
</div>

<div class="controls">
  <select onchange="loadit(this.value)">
    <option value="">選擇模型</option>
    <option value="./models/alice.glb">Alice</option>
    <option value="./models/Astronaut.glb">Astronaut</option>
    <option value="./models/buddha.glb">Buddha</option>
    <option value="./models/113213074.glb">陳龍華</option>
  </select>
</div>

<div class="viewer">
  <babylon id="viewerID"><vr></vr></babylon>
</div>

<a class="btn" href="index.html">⬅ 回到首頁</a>

</body>
</html>
