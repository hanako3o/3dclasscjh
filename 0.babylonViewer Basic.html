<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babylon Viewer 基礎</title>

<script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

<style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(120deg, #1a1a2e, #16213e, #0f3460);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    padding: 40px 20px 10px;
  }

  .header h1 {
    margin: 0;
    font-size: 36px;
  }

  .subtitle {
    color: #cfcfcf;
    margin-top: 8px;
  }

  .btn {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    text-decoration: none;
    transition: 0.3s;
    display: inline-block;
  }

  .btn:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
  }

  .viewer {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 30px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    background: #000;
  }

  babylon {
    width: 100%;
    height: 100%;
    display: block;
  }

  .back {
    margin-top: 30px;
  }

</style>
</head>

<body>

<div class="header">
  <h1>Babylon Viewer 基礎展示</h1>
  <div class="subtitle">3D 模型互動展示</div>
</div>

<div class="viewer">
  <babylon model="./models/113213074.glb"></babylon>
</div>

<div class="back">
  <a class="btn" href="index.html">⬅ 回到首頁</a>
</div>

</body>
</html>
