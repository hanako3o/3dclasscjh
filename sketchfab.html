<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Sketchfab 展示</title>

<style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(120deg, #1a1a2e, #16213e, #0f3460);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    padding: 40px 20px 10px;
  }

  .header h1 {
    margin: 0;
    font-size: 36px;
  }

  .subtitle {
    color: #cfcfcf;
    margin-top: 8px;
  }

  .btn {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    text-decoration: none;
    transition: 0.3s;
    display: inline-block;
  }

  .btn:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
  }

  .viewer {
    width: 80%;
    max-width: 900px;
    height: 500px;
    margin-top: 30px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .back {
    margin-top: 30px;
  }

</style>
</head>

<body>

<div class="header">
  <h1>Sketchfab 模型展示</h1>
  <div class="subtitle">陳龍華的模型展示頁面</div>
  <a class="btn" href="https://skfb.ly/pHQzG" target="_blank">🔗 前往 Sketchfab</a>
</div>

<div class="viewer">
  <iframe title="cac-1774421718691" allowfullscreen
    allow="autoplay; fullscreen; xr-spatial-tracking"
    src="https://sketchfab.com/models/ba6ac0fc16ed47a191468b199bd96498/embed">
  </iframe>
</div>

<div class="back">
  <a class="btn" href="index.html">⬅ 回到首頁</a>
</div>

</body>
</html>
